name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build binary
        run: CGO_ENABLED=0 go build -trimpath -o /tmp/mock-vllm ./cmd/mock-vllm

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Build image
        run: docker build -t mock-vllm:ci .

      - name: Start container
        run: docker run -d --name mock-vllm-ci -p 18000:8000 mock-vllm:ci

      - name: Integration test (container)
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18000/health >/dev/null; then
              break
            fi
            sleep 1
          done
          INTEGRATION_BASE_URL=http://127.0.0.1:18000 go test -race -count=1 ./integration/...

      - name: Remove container
        if: always()
        run: docker rm -f mock-vllm-ci