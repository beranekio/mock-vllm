name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build binary
        run: CGO_ENABLED=0 go build -trimpath -o /tmp/mock-vllm ./cmd/mock-vllm

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Build image
        run: docker build -t mock-vllm:ci .

      - name: Start mock-vllm container
        run: docker run -d --name mock-vllm-ci -p 18000:8000 mock-vllm:ci

      - name: Health check
        run: |
          ok=1
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18000/health >/dev/null; then
              ok=0
              break
            fi
            sleep 1
          done
          if [ "$ok" -ne 0 ]; then
            echo "mock-vllm did not become healthy within 30s" >&2
            exit 1
          fi

      - name: Run OpenAI compatibility tests
        run: |
          # The tester image is pinned to the manifest-list digest of
          # `:latest` to make CI reproducible. Bump the digest
          # intentionally when the upstream tester image is updated.
          docker run --rm --network host \
            -e OPENAI_BASE_URL=http://127.0.0.1:18000/v1 \
            -e OPENAI_API_KEY=test-key \
            -e OPENAI_MODEL=mock-model \
            -e OPENAI_EMBEDDING_MODEL=mock-model \
            -e OPENAI_COMPLETION_MODEL=mock-model \
            -e TEST_SUITES=models,models_get,chat_completions,chat_completions_stream,completions,completions_stream,embeddings,embeddings_batch,responses,responses_stream,responses_input_tokens \
            -e REQUEST_TIMEOUT=30s \
            ghcr.io/beranekio/openai-compatibility-tester@sha256:683a7cc5798547656b8ec8c9c1b54ab2dcf13ec6ba2dbf3a5bed299157213274

      - name: Run Anthropic integration tests
        run: INTEGRATION_BASE_URL=http://127.0.0.1:18000 go test -race -count=1 ./integration/...

      - name: Remove container
        if: always()
        run: docker rm -f mock-vllm-ci